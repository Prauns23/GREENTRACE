<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <!-- Two-column layout -->
        <!-- Close button -->
        <span class="close-btn" onclick="parent.hideLogin && parent.hideLogin()">×</span>

        <div class="login-grid">
            <!-- LEFT COLUMN - Form -->
            <div class="form-column">

                <!-- Header -->
                <h1>Create your account</h1>
                <p class="subtitle">Every tree begins with one step — yours.</p>

                <!-- Form -->
                <form>
                    <!-- First Name & Last Name row -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name <span class="required">*</span></label>
                            <input type="text" placeholder="First Name">
                        </div>
                        <div class="form-group">
                            <label>Last Name <span class="required">*</span></label>
                            <input type="text" placeholder="Last Name">
                        </div>
                    </div>

                    <!-- Email Address -->
                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" placeholder="Email Account">
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="password" placeholder="Password">
                    </div>

                    <!-- Phone Number -->
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <div class="phone-input">
                            <span class="country-code">PHIL</span>
                            <input type="tel" placeholder="09XX-XXX-YYYY">
                        </div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="terms">
                        By signing up, you have agreed to our <a href="#">Terms & Conditions</a> and <a href="#">Privacy
                            Policy</a>.
                    </div>

                    <!-- Create Account Button -->
                    <button type="submit" class="create-btn">Create Account</button>

                    <!-- Sign In Link -->
                    <div class="signin-link">
                        Already have an account? <a href="#">Sign in</a>
                    </div>
                </form>
            </div>

            <!-- RIGHT COLUMN - Image -->
            <div class="image-column">
                <img src="login-img.svg" alt="Tree planting" class="side-image">
                <!-- Optional overlay text -->
            </div>
        </div>
    </div>
</body>

</html>
